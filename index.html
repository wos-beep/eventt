<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Task Merger v2.51</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { font-size: 1.2rem; color: #bb86fc; margin: 0; }
        .version { font-size: 0.7rem; color: #888; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; }
        .event-name { font-weight: bold; color: #03dac6; margin-bottom: 10px; display: block; font-size: 0.9rem; }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .control-group { flex: 1; min-width: 120px; }
        label { font-size: 0.7rem; color: #888; display: block; margin-bottom: 4px; }
        select, input { width: 100%; background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 0.85rem; box-sizing: border-box; }
        pre { background: #2d2d2d; padding: 12px; border-radius: 8px; font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap; color: #fff; border: 1px solid #444; margin: 0; line-height: 1.4; font-family: monospace; }
        button { width: 100%; padding: 14px; background: #bb86fc; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 1rem; }
        button:active { transform: scale(0.98); }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #03dac6; color: #000; padding: 10px 24px; border-radius: 30px; display: none; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📋 イベント統合コピー</h1>
        <div class="version">Version 2.51 (2026.03.03 安定版)</div>
    </header>
    
    <div class="card">
        <span class="event-name">イベント選択・統合設定</span>
        <div class="controls">
            <div class="control-group">
                <label>ベースイベント</label>
                <select id="baseEvent"></select>
            </div>
            <div class="control-group">
                <label>追加イベント（任意）</label>
                <select id="overlayEvent">
                    <option value="">なし（単体表示）</option>
                </select>
            </div>
            <div class="control-group" style="flex: 0.3;">
                <label>開始日ズレ</label>
                <input type="number" id="offset" value="0" min="0">
            </div>
        </div>
        <button onclick="updateOutput()">プレビューを更新</button>
    </div>

    <div id="outputArea" class="card" style="display:none;">
        <span id="displayName" class="event-name"></span>
        <pre id="outputText"></pre>
        <button onclick="copyToClipboard()" style="background:#03dac6;">この内容をコピー</button>
    </div>
</div>
<div id="toast" class="toast">コピーしました！</div>

<script>
const rawData = [
    { id: "a", name: "同盟大作戦with軍備･士官", data: {"行商":"◎◎◎◎◎◎◎","火晶":"◯◯－－◎◯◯","加速":"◯◯－－◎◯◯","採集":"◎－◎－－－－","専門":"◯◎－－－－－","訓練":"－－△◎－－－","ﾍﾟｯﾄ":"－－◯－－◎◎","英装":"－－△◯△◎◎","欠片":"△◯－－－△◎","領装":"△△－－◯△◎","宝石":"－－◯△－△△","ﾀﾞｲﾔ":"△◎△△◯△△"}, days: 7, note: "※7日は半日のみ" },
    { id: "s", name: "季節イベント", data: {"建造":"◯－－－－◯－","研究":"◯－－－－◯－","訓練":"◯－－◎－◯－","鍵　":"◯－◯－－－－","欠片":"◯－◯－－－－","野獣":"－◯－－－－－","加速":"－－◯－－－◯","英装":"－－－－◯－－","ﾀﾞｲﾔ":"－－－－◯－－","採集":"－－－－－◯－","領装":"－－－－－－◯"}, days: 7 },
    { id: "k", name: "最強王国準備フェーズ", data: {"宝石":"◯－◯◯－","火晶":"◯◯－－◯","加速":"◯◯－－◯","ﾙﾚｯﾄ":"－◯◯－－","欠片":"－◯◯－－","採集":"－◯－－－","専門":"－◯◯－－","ﾍﾟｯﾄ":"－－◯－◯","野獣":"－－◯－－","英装":"－－－－◯","訓練":"－－－◯－","領装":"－－－－◯"}, days: 5 },
    { id: "i", name: "氷原支配者", data: {"火晶":"◯◯－－◯－◯","加速":"◯◯－－◯－◯","宝石":"◯－◯◯－－－","ﾙﾚｯﾄ":"－◯◯－－－－","欠片":"－◯◯－－－◯","英装":"－◯－◯◯－－","専門":"－◯◯－－－－","ﾍﾟｯﾄ":"－－◯－－－◯","訓練":"－－－◯－◯－","領装":"－－－－－◯◯","採集":"－－－－－－◯"}, days: 7 },
    { id: "o", name: "軍備競技･士官計画", data: {"火晶":"◯◯－－◯◯－－","加速":"◯◯－－◯◯－－","欠片":"◯◯－－－－◯◯","領装":"◯◯－－◯◯◯◯","専門":"◯◯－－－－－－","宝石":"－－◯◯－－－－","英装":"－－◯◯◯◯◯◯","訓練":"－－◯◯－－－－"}, days: 8 }
];

const bSel = document.getElementById('baseEvent');
const oSel = document.getElementById('overlayEvent');
const fullWidthDigits = ["０","１","２","３","４","５","６","７","８","９"];

// 初期化
rawData.forEach(e => {
    bSel.add(new Option(e.name, e.id));
    oSel.add(new Option(e.name, e.id));
});

function formatText(title, data, days, note="") {
    // 日数を全角数字に変換して整列を維持
    let header = "日数|" + Array.from({length: days}, (_, i) => {
        let n = (i + 1).toString();
        return n.split('').map(d => fullWidthDigits[parseInt(d)]).join('');
    }).join(' ');
    
    let rows = Object.keys(data).map(k => {
        let key = k.substring(0,2);
        return `${key}|${data[k].split('').join(' ')}`;
    });
    return `${title}\n${header}\n${rows.join('\n')}${note ? '\n'+note : ''}`;
}

function updateOutput() {
    const b = rawData.find(x => x.id === bSel.value);
    const oId = oSel.value;
    const shift = parseInt(document.getElementById('offset').value) || 0;
    
    let finalTitle, finalData, finalDays, finalNote;

    if (!oId) {
        // 単体表示
        finalTitle = b.name;
        finalData = b.data;
        finalDays = b.days;
        finalNote = b.note;
    } else {
        // 統合表示
        const o = rawData.find(x => x.id === oId);
        finalDays = Math.max(b.days, o.days + shift);
        finalTitle = `統合:${b.name.substring(0,2)}+${o.name.substring(0,2)}`;
        finalNote = b.note || "";
        
        let merged = {};
        const allKeys = new Set([...Object.keys(b.data), ...Object.keys(o.data)]);
        allKeys.forEach(key => {
            let row = "";
            for (let d = 0; d < finalDays; d++) {
                const bV = (b.data[key] || "")[d] || "－";
                const oV = (o.data[key] || "")[d - shift] || "－";
                if (bV !== "－" && oV !== "－") row += "◎";
                else row += (bV !== "－") ? bV : oV;
            }
            merged[key] = row;
        });
        finalData = merged;
    }

    document.getElementById('displayName').innerText = finalTitle;
    document.getElementById('outputText').innerText = formatText(finalTitle, finalData, finalDays, finalNote);
    document.getElementById('outputArea').style.display = 'block';
}

function copyToClipboard() {
    const t = document.getElementById('outputText').innerText;
    navigator.clipboard.writeText(t).then(() => {
        const s = document.getElementById('toast');
        s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 2000);
    });
}
</script>
</body>
</html>
