<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Task Merger v1.7</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        header { text-align: center; border-bottom: 1px solid #333; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { font-size: 1.4rem; color: #bb86fc; margin: 0; }
        .version { font-size: 0.8rem; color: #888; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid #333; }
        .event-name { font-weight: bold; color: #03dac6; margin-bottom: 10px; display: block; }
        .controls { display: grid; grid-template-columns: 1fr 1fr 60px; gap: 10px; margin-bottom: 15px; }
        .legend { font-size: 0.75rem; color: #aaa; margin-bottom: 10px; line-height: 1.4; }
        select, input { background: #2d2d2d; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 4px; font-size: 0.9rem; width: 100%; box-sizing: border-box; }
        pre { background: #2d2d2d; padding: 12px; border-radius: 8px; font-size: 0.85rem; overflow-x: auto; white-space: pre-wrap; color: #fff; border: 1px solid #444; margin: 0; line-height: 1.6; }
        button { width: 100%; padding: 14px; background: #bb86fc; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #03dac6; color: #000; padding: 10px 24px; border-radius: 30px; display: none; font-weight: bold; z-index: 1000; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>📋 イベント統合ツール</h1><div class="version">Version 1.7 (2026.03.03 更新)</div></header>
    
    <div class="card">
        <span class="event-name">カスタム統合</span>
        <div class="legend">◎:重複 / 大,季,準,氷,軍:単体タスク</div>
        <div class="controls">
            <select id="baseEvent"></select>
            <select id="overlayEvent"></select>
            <input type="number" id="offset" value="0" min="0" title="開始日をずらす">
        </div>
        <button onclick="mergeEvents()">統合プレビューを生成</button>
        <div id="previewArea" style="margin-top:15px; display:none;">
            <pre id="mergedText"></pre>
            <button onclick="copyToClipboard('mergedText')" style="background:#03dac6; margin-top:10px;">統合結果をコピー</button>
        </div>
    </div>

    <div id="app"></div>
</div>
<div id="toast" class="toast">コピーしました！</div>

<script>
const rawData = [
    { id: "a", name: "同盟大作戦with軍備･士官", short: "大", data: {"行商":"◎◎◎◎◎◎◎","火晶":"◯◯－－◎◯◯","加速":"◯◯－－◎◯◯","採集":"◎－◎－－－－","専門":"◯◎－－－－－","訓練":"－－△◎－－－","ﾍﾟｯﾄ":"－－◯－－◎◎","英装":"－－△◯△◎◎","欠片":"△◯－－－△◎","領装":"△△－－◯△◎","宝石":"－－◯△－△△","ﾀﾞｲﾔ":"△◎△△◯△△"}, days: 7 },
    { id: "s", name: "季節イベント", short: "季", data: {"建造":"◯－－－－◯－","研究":"◯－－－－◯－","訓練":"◯－－◎－◯－","鍵　":"◯－◯－－－－","欠片":"◯－◯－－－－","野獣":"－◯－－－－－","加速":"－－◯－－－◯","英装":"－－－－◯－－","ﾀﾞｲﾔ":"－－－－◯－－","採集":"－－－－－◯－","領装":"－－－－－－◯"}, days: 7 },
    { id: "k", name: "最強王国準備フェーズ", short: "準", data: {"宝石":"◯－◯◯－","火晶":"◯◯－－◯","加速":"◯◯－－◯","ﾙﾚｯﾄ":"－◯◯－－","欠片":"－◯◯－－","採集":"－◯－－－","専門":"－◯◯－－","ﾍﾟｯﾄ":"－－◯－◯","野獣":"－－◯－－","英装":"－－－－◯","訓練":"－－－◯－","領装":"－－－－◯"}, days: 5 },
    { id: "i", name: "氷原支配者", short: "氷", data: {"火晶":"◯◯－－◯－◯","加速":"◯◯－－◯－◯","宝石":"◯－◯◯－－－","ﾙﾚｯﾄ":"－◯◯－－－－","欠片":"－◯◯－－－◯","英装":"－◯－◯◯－－","専門":"－◯◯－－－－","ﾍﾟｯﾄ":"－－◯－－－◯","訓練":"－－－◯－◯－","領装":"－－－－－◯◯","採集":"－－－－－－◯"}, days: 7 },
    { id: "o", name: "軍備競技･士官計画", short: "軍", data: {"火晶":"◯◯－－◯◯－－","加速":"◯◯－－◯◯－－","欠片":"◯◯－－－－◯◯","領装":"◯◯－－◯◯◯◯","専門":"◯◯－－－－－－","宝石":"－－◯◯－－－－","英装":"－－◯◯◯◯◯◯","訓練":"－－◯◯－－－－"}, days: 8 }
];

function formatText(title, data, days) {
    let header = "日数　" + Array.from({length: days}, (_, i) => (i + 1).toString()).join('　');
    let rows = Object.keys(data).map(k => k + "　" + data[k].split('').join('｜'));
    return title + "\n" + header + "\n" + rows.join('\n');
}

const app = document.getElementById('app');
const baseSel = document.getElementById('baseEvent');
const overSel = document.getElementById('overlayEvent');

rawData.forEach(e => {
    baseSel.add(new Option(e.name, e.id));
    overSel.add(new Option(e.name, e.id));
    const d = document.createElement('div');
    d.className = 'card';
    d.innerHTML = `<span class="event-name">${e.name}</span><pre id="${e.id}">${formatText(e.name, e.data, e.days)}</pre><button onclick="copyToClipboard('${e.id}')">コピー</button>`;
    app.appendChild(d);
});

function mergeEvents() {
    const b = rawData.find(x => x.id === baseSel.value);
    const o = rawData.find(x => x.id === overSel.value);
    const shift = parseInt(document.getElementById('offset').value) || 0;
    const maxDays = Math.max(b.days, o.days + shift);
    let merged = {};
    const allKeys = new Set([...Object.keys(b.data), ...Object.keys(o.data)]);

    allKeys.forEach(key => {
        let row = "";
        for (let d = 0; d < maxDays; d++) {
            const bVal = (b.data[key] && b.data[key][d]) ? b.data[key][d] : "－";
            const oVal = (o.data[key] && o.data[key][d - shift]) ? o.data[key][d - shift] : "－";
            
            if (bVal !== "－" && oVal !== "－") {
                row += "◎";
            } else if (bVal !== "－") {
                row += b.short;
            } else if (oVal !== "－") {
                row += o.short;
            } else {
                row += "－";
            }
        }
        merged[key] = row;
    });

    document.getElementById('mergedText').innerText = formatText(`統合：${b.name}＋${o.name}`, merged, maxDays);
    document.getElementById('previewArea').style.display = 'block';
}

function copyToClipboard(id) {
    const t = document.getElementById(id).innerText;
    navigator.clipboard.writeText(t).then(() => {
        const s = document.getElementById('toast');
        s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 2000);
    });
}
</script>
</body>
</html>
