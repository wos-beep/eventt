<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Task Merger v5.0</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: auto; padding: 20px; }
        .stepper { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        pre { background: #000; color: #fff; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #03dac6; color: #000; padding: 10px 20px; border-radius: 20px; display: none; }
    </style>
</head>
<body>
    <h1>📋 タスク統合 v5.0</h1>
    <label>ベース</label><select id="baseEvent"></select>
    <label>重ね合わせ</label><select id="overlayEvent"><option value="">なし</option></select>
    
    <div class="stepper">
        <span>重ねズレ:</span>
        <button onclick="step('overlayShift',-1)">－</button>
        <input type="number" id="overlayShift" value="0" readonly style="width:50px; text-align:center;">
        <button onclick="step('overlayShift',1)">＋</button>
    </div>

    <div class="stepper">
        <span>開始日:</span>
        <button onclick="step('rangeStart',-1)">－</button>
        <input type="number" id="rangeStart" value="1" readonly style="width:50px; text-align:center;">
        <button onclick="step('rangeStart',1)">＋</button>
    </div>

    <pre id="outputText"></pre>
    <button onclick="copyToClipboard()" style="width:100%; padding:15px;">コピーする</button>
    <div id="toast" class="toast">コピーしました！</div>

    <script src="script.js"></script>
</body>
</html>
